# ClariceOS — zRAM compressed swap
# Allocates up to half of physical RAM as compressed swap (ZSTD).
# Dramatically improves responsiveness on systems with 4–8 GB RAM.
# Reference: Bazzite and Fedora use 4 GB ZSTD zRAM by default.

[zram0]
zram-size = min(ram / 2, 4096)
compression-algorithm = zstd
