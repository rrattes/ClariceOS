# GDM configuration storage

[daemon]
# Use Wayland (default for GNOME 45+). GNOME 48 removed Xorg session support
# from GDM, so WaylandEnable=false causes GDM to start but find no session.
AutomaticLoginEnable=True
AutomaticLogin=live

[security]

[xdmcp]

[chooser]

[debug]
# Uncomment the line below to turn on debugging
#Enable=true
