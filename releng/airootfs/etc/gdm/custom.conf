# GDM configuration storage

[daemon]
# Force Xorg: GDM 45+ prefers Wayland but GNOME Shell Wayland fails on many
# live-ISO hardware configs (DRM/KMS, missing GPU driver, etc.), causing GDM
# to drop to the login screen instead of completing autologin.
WaylandEnable=false
AutomaticLoginEnable=True
AutomaticLogin=live

[security]

[xdmcp]

[chooser]

[debug]
# Uncomment the line below to turn on debugging
#Enable=true
