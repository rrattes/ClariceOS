# ClariceOS pamac configuration
# AUR support is enabled by default.

[options]
# How often to check for updates (in hours); 0 = never
RefreshPeriod = 6

# Enable AUR support
EnableAUR = true

# Check for updates from AUR
CheckAURUpdates = true

# Remove build dependencies after install
RemoveMakesDeps = true

# Don't keep downloaded packages in cache indefinitely
KeepNumPackages = 2

# Show download size in UI
DownloadUpdates = false

# Notify about available updates
NoUpdateHideIcon = false
