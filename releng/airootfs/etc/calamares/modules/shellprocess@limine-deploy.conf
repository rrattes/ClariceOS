---
# Final Limine deploy — runs OUTSIDE the target chroot immediately before
# filesystem unmount.
#
# dontChroot: true  → script runs on the live ISO environment, with direct
#                     access to all block devices. This avoids the /proc
#                     bind-mount dependency that makes "limine bios-install"
#                     unreliable when executed inside a Calamares chroot.
#
# The existing shellprocess@bootloader (dontChroot: false) generates
# limine.cfg correctly inside the chroot. This module handles the raw disk
# write (MBR for BIOS, EFI binaries for UEFI) and enables limine-snapper-sync.
dontChroot: true
timeout: 120

script:
  - "/etc/calamares/scripts/limine-deploy.sh"
