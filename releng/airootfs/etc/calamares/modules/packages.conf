---
backend:   pacman
update_db: false

operations:
  - remove:
    # Calamares installer and its dependencies
    - calamares
    - calamares-libs
    - python-pyqt5
    - python-yaml
    - python-jsonschema
    - qt5-webengine
    - qt5-svg
    - ckbcomp
    - hwinfo
    # Arch install helpers (live-only)
    - arch-install-scripts
    - archinstall
    # Live audio/boot helpers
    - livecd-sounds
    - alsa-utils
    - mkinitcpio-archiso
    - mkinitcpio-nfs-utils
    # Live-only WiFi firmware helpers
    - b43-fwcutter
    - broadcom-wl
    # Rescue/recovery tools (live-only)
    - clonezilla
    - ddrescue
    - fsarchiver
    - gpart
    - partclone
    - partimage
    - testdisk
    # Server/live-only services
    - cloud-init
    - darkhttpd
    - open-iscsi
    - nbd
    # Accessibility (live tty helpers)
    - espeakup
    - brltty
    - gpm
    # Redundant bootloaders (ClariceOS uses Limine)
    - grub
    - refind
    - syslinux
    # Live-only build tools
    - squashfs-tools
    # Live-only ZSH config
    - grml-zsh-config
    # VM guest utilities (user can install if needed)
    - hyperv
    - open-vm-tools
    - qemu-guest-agent
    - virtualbox-guest-utils-nox
    # Old/obsolete network dialers
    - pptpclient
    - rp-pppoe
    - vpnc
    - wvdial
    - xl2tpd
    # IRC client (live-only)
    - irssi
