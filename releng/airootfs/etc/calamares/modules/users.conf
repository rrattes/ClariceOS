---
userShell: /bin/bash

rootPasswordSet: true

autologinGroup:  autologin
sudoersGroup:    wheel

setRootPassword:  true
doAutologin:      false
doReusePassword:  true

passwordRequirements:
  minLength: 6
  maxLength: -1

forbiddenNames:
  - root
  - daemon
  - bin
  - sys
  - sync
  - games
  - man
  - lp
  - mail
  - news
  - uucp
  - proxy
  - www-data
  - backup
  - list
  - irc
  - gnats
  - nobody
