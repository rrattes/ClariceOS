---
modules-search: [ local, /usr/lib/calamares/modules ]

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - netinstall
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - luksbootkeyfile
    - luksopenswaphookcfg
    - packages
    - netinstall
    - initramfscfg
    - shellprocess@btrfshooks
    - initramfs
    - shellprocess@bootloader
    - removeuser
    - hwclock
    - services-systemd
    - users
    - shellprocess
    - networkcfg
    - umount
  - show:
    - finished

branding: clariceos

prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
quit-at-end: false
